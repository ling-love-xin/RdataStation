[meta]
id = "quality-score"
name = "列质量评分"
category = "quality"
applies_to = ["Any"]
version = "1.0"
builtin = true
description = "基于空值率、去重率、数据分布计算列质量评分 (0-100)。实际评分由 quality_scorer.rs 通过 ColumnInsightFull 四维度计算，此规则提供原始 SQL 统计查询。"

[query]
template = """
WITH stats AS (
    SELECT
        COUNT(*) as total,
        SUM(CASE WHEN "{col}" IS NULL THEN 1 ELSE 0 END) as nulls,
        COUNT(DISTINCT "{col}") as distinct_vals
    FROM "{table}"
),
bounds AS (
    SELECT
        MIN("{col}") as min_val,
        MAX("{col}") as max_val,
        AVG("{col}") as avg_val
    FROM "{table}"
    WHERE "{col}" IS NOT NULL
)
SELECT
    total, nulls, distinct_vals,
    ROUND(CAST(nulls AS FLOAT) / NULLIF(total, 0) * 100, 2) as null_pct,
    ROUND(CAST(distinct_vals AS FLOAT) / NULLIF(total - nulls, 0) * 100, 2) as distinct_pct,
    min_val, max_val, avg_val
FROM stats, bounds
"""
parameters = ["table", "col"]
result_type = "single"

[[output]]
sql_name = "total"
json_name = "total"
value_type = "i64"

[[output]]
sql_name = "nulls"
json_name = "nulls"
value_type = "i64"

[[output]]
sql_name = "distinct_vals"
json_name = "distinct_vals"
value_type = "i64"

[[output]]
sql_name = "null_pct"
json_name = "null_pct"
value_type = "f64"

[[output]]
sql_name = "distinct_pct"
json_name = "distinct_pct"
value_type = "f64"

[[output]]
sql_name = "min_val"
json_name = "min_val"
value_type = "str"

[[output]]
sql_name = "max_val"
json_name = "max_val"
value_type = "str"

[[output]]
sql_name = "avg_val"
json_name = "avg_val"
value_type = "str"